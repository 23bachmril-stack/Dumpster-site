<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Holley Dispatch | Employee Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --turq: #40E0D0; --dark: #111; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border-left: 5px solid var(--turq); }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .btn { background: var(--turq); color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h2 style="color:var(--turq)">EMPLOYEE LOGIN</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="login()">Login to Dispatch</button>
    </div>

    <div id="dashboard">
        <h1>Active Orders</h1>
        <div id="order-list">Loading orders...</div>
    </div>

<script>
    const SB_URL = 'https://RequestsService.supabase.co';
    const SB_KEY = 'sb_publishable_JS5YNr2g_rQJ5LGXeV8xmw_HOedqeXd';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        
        if (error) alert(error.message);
        else checkAdmin(data.user.id);
    }

    async function checkAdmin(uid) {
        const { data } = await _supabase.from('profiles').select('role').eq('id', uid).single();
        if (data?.role === 'admin') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            fetchOrders();
        } else {
            alert("Access Denied: You are not an admin.");
            _supabase.auth.signOut();
        }
    }

    async function fetchOrders() {
        const { data } = await _supabase.from('dumpster_orders').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('order-list');
        list.innerHTML = data.map(o => `
            <div class="card">
                <h3>${o.customer_name}</h3>
                <p>📍 ${o.delivery_address}</p>
                <p>🏗️ Size: ${o.container}</p>
                <p>📅 ${o.order_date} at ${o.order_time}</p>
                <button onclick="updateStatus('${o.id}')" style="background:#333; color:white; border:none; padding:5px 10px; cursor:pointer;">Mark Delivered</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
