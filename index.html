<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holley Container Service | Reliable Waste Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --turquoise: #40E0D0; --dark: #000; --white: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Navigation */
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--turquoise); position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 50px; }
        .login-btn { color: var(--turquoise); font-weight: bold; border: 2px solid var(--turquoise); padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; }

        /* Hero Section */
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.postimg.cc/MX6xvJGY/IMG-1185.jpg'); background-size: cover; background-position: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 0 10%; }
        h1 { font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; }
        .btn-order { padding: 20px 40px; background: var(--turquoise); color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; overflow-y: auto; }
        .modal-card { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 10px; border-top: 10px solid var(--turquoise); position: relative; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .survey-step { display: none; }
        .active-step { display: block; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="https://i.postimg.cc/JnYjTMfb/IMG-1186.jpg" class="logo-img">
    </div>
    <div class="nav-right">
        <a id="auth-link" class="login-btn" onclick="openLogin()">Login / Sign Up</a>
    </div>
</nav>

<section class="hero">
    <h1>Reliable Waste Disposal</h1>
    <button class="btn-order" onclick="openSurvey()">Order Dumpster Now</button>
</section>

<div id="login-modal" class="modal-overlay">
    <div class="modal-card">
        <span class="close-btn" onclick="closeLogin()">&times;</span>
        <h2>Account Access</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleLogin()" style="width:100%; background:var(--turquoise); color:white; padding:15px; border:none; cursor:pointer;">SIGN IN</button>
        <p style="margin-top:15px; text-align:center; cursor:pointer; color:var(--turquoise)" onclick="handleSignUp()">New here? Create Account</p>
    </div>
</div>

<div id="survey-modal" class="modal-overlay">
    <div class="modal-card">
        <span class="close-btn" onclick="closeSurvey()">&times;</span>
        <form id="orderForm" onsubmit="submitOrder(event)">
            <div id="step1" class="survey-step active-step">
                <h2>Contact Info</h2>
                <input type="text" id="cust_name" placeholder="Full Name" required>
                <input type="email" id="cust_email" placeholder="Email" required>
                <button type="button" onclick="nextStep(1, 2)" style="width:100%; padding:15px; background:var(--turquoise); color:white; border:none;">Next</button>
            </div>
            <div id="step2" class="survey-step">
                <h2>Address</h2>
                <input type="text" id="cust_addr" placeholder="Delivery Address" required>
                <select id="cust_size">
                    <option value="10yd">10 Yard</option>
                    <option value="15yd">15 Yard</option>
                    <option value="20yd">20 Yard</option>
                </select>
                <button type="submit" style="width:100%; padding:15px; background:var(--turquoise); color:white; border:none;">Submit Order</button>
            </div>
        </form>
    </div>
</div>

<script>
    const SB_URL = 'https://RequestsService.supabase.co';
    const SB_KEY = 'sb_publishable_JS5YNr2g_rQJ5LGXeV8xmw_HOedqeXd';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // Modal Controls
    function openLogin() { document.getElementById('login-modal').style.display='flex'; }
    function closeLogin() { document.getElementById('login-modal').style.display='none'; }
    function openSurvey() { document.getElementById('survey-modal').style.display='flex'; }
    function closeSurvey() { document.getElementById('survey-modal').style.display='none'; }

    function nextStep(current, next) {
        document.getElementById('step'+current).classList.remove('active-step');
        document.getElementById('step'+next).classList.add('active-step');
    }

    // Auth Logic
    async function handleLogin() {
        const { data, error } = await _supabase.auth.signInWithPassword({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
        });
        if(error) alert(error.message);
        else location.reload();
    }

    async function handleSignUp() {
        const { data, error } = await _supabase.auth.signUp({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
        });
        if(error) alert(error.message);
        else alert("Check email for confirmation link!");
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(user) document.getElementById('auth-link').innerText = "Logout (" + user.email.split('@')[0] + ")";
    }
    checkUser();

    // Order Submission
    async function submitOrder(e) {
        e.preventDefault();
        const payload = {
            customer_name: document.getElementById('cust_name').value,
            email: document.getElementById('cust_email').value,
            delivery_address: document.getElementById('cust_addr').value,
            container: document.getElementById('cust_size').value,
            status: 'New'
        };
        const { error } = await _supabase.from('dumpster_orders').insert([payload]);
        if(error) alert(error.message);
        else { alert("Order Sent!"); location.reload(); }
    }
</script>
</body>
</html>
